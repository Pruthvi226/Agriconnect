services:
  db:
    image: mysql:8.3
    container_name: agriconnect_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: agriconnect
      MYSQL_USER: ${DB_USER:-agriconnect}
      MYSQL_PASSWORD: ${DB_PASS}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./src/main/resources/seed-data.sql:/docker-entrypoint-initdb.d/02-seed-data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    container_name: agriconnect_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/agriconnect?useSSL=false&serverTimezone=UTC
      DB_USER: ${DB_USER:-agriconnect}
      DB_PASS: ${DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      AES_SECRET_KEY: ${AES_SECRET_KEY}
      HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      HIBERNATE_DEFAULT_SCHEMA:
      HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy

  adminer:
    image: adminer
    container_name: agriconnect_adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  db_data:
