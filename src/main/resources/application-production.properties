# ── Database ─────────────────────────────────────────────────────────────────
# Production values are injected via Render Dashboard Environment Variables.
# H2 in-memory fallback lets the app start (and serve /health) even if DB vars
# are missing — DB-dependent endpoints will fail gracefully.
jdbc.driverClassName=${DB_DRIVER:org.h2.Driver}
jdbc.url=${DB_URL:jdbc:h2:mem:agriconnect;DB_CLOSE_DELAY=-1;MODE=MySQL}
jdbc.username=${DB_USER:sa}
jdbc.password=${DB_PASS:}
jdbc.pool.maximumPoolSize=${DB_POOL_MAX:3}
jdbc.pool.minimumIdle=${DB_POOL_MIN:1}
# Keep connection timeout short so startup doesn't hang waiting for DB.
jdbc.pool.connectionTimeoutMs=${DB_CONNECTION_TIMEOUT_MS:5000}
# -1 = don't fail startup if the pool can't get a connection immediately.
# This allows /health to respond even if the DB isn't ready yet.
jdbc.pool.initializationFailTimeout=-1

# ── Hibernate ─────────────────────────────────────────────────────────────────
# Default to update so Hibernate creates tables on first boot.
# Switch HIBERNATE_DDL_AUTO to 'validate' in render.yaml once schema is stable.
hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
hibernate.show_sql=false
hibernate.format_sql=false
hibernate.hbm2ddl.auto=${HIBERNATE_DDL_AUTO:update}

# ── Security ─────────────────────────────────────────────────────────────────
# Set strong secrets in the Render Dashboard Environment Variables.
jwt.secret=${JWT_SECRET:supersecretdevjwtkeythathastobeatleast256bitslong!}
aes.secret.key=${AES_SECRET_KEY:12345678901234567890123456789012}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}
