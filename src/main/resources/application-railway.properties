# Railway notes for this classic Spring MVC WAR.
# The runtime configuration is read through application.properties and can be
# overridden with Railway environment variables.

jdbc.driverClassName=com.mysql.cj.jdbc.Driver
jdbc.url=${DB_URL}
jdbc.username=${DB_USER}
jdbc.password=${DB_PASS}
jdbc.pool.maximumPoolSize=${DB_POOL_MAX:5}
jdbc.pool.minimumIdle=${DB_POOL_MIN:1}
jdbc.pool.connectionTimeoutMs=${DB_CONNECTION_TIMEOUT_MS:30000}

hibernate.dialect=org.hibernate.dialect.MySQLDialect
hibernate.show_sql=false
hibernate.format_sql=false
hibernate.hbm2ddl.auto=${HIBERNATE_DDL_AUTO:validate}

jwt.secret=${JWT_SECRET}
aes.secret.key=${AES_SECRET_KEY}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}
