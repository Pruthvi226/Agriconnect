# Database. Environment variables override these defaults in Docker/Railway.
jdbc.driverClassName=${DB_DRIVER:org.h2.Driver}
jdbc.url=${DB_URL:jdbc:h2:mem:agriconnect;DB_CLOSE_DELAY=-1;MODE=MySQL}
jdbc.username=${DB_USER:sa}
jdbc.password=${DB_PASS:}
jdbc.pool.maximumPoolSize=${DB_POOL_MAX:10}
jdbc.pool.minimumIdle=${DB_POOL_MIN:2}
jdbc.pool.connectionTimeoutMs=${DB_CONNECTION_TIMEOUT_MS:30000}

# Hibernate
hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
hibernate.show_sql=${HIBERNATE_SHOW_SQL:false}
hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}
hibernate.hbm2ddl.auto=${HIBERNATE_DDL_AUTO:update}
hibernate.default_schema=${HIBERNATE_DEFAULT_SCHEMA:PUBLIC}

# Security. Set strong secrets in production.
jwt.secret=${JWT_SECRET:supersecretdevjwtkeythathastobeatleast256bitslong!}
aes.secret.key=${AES_SECRET_KEY:12345678901234567890123456789012}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}
