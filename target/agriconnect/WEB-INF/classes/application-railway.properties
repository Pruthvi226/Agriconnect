# ============================================================
#  application-railway.properties
#  Spring profile activated when SPRING_PROFILES_ACTIVE=railway
#
#  Railway automatically injects environment variables from:
#    - The MySQL plugin (MYSQL_URL, MYSQL_USER, MYSQL_PASSWORD)
#    - Any variables you set via: railway variables set KEY=VALUE
#    - The PORT variable (always injected by Railway)
# ============================================================

# --- Server ---
# Railway injects PORT dynamically. Default to 8080 for local testing.
server.port=${PORT:8080}

# --- DataSource ---
# Railway MySQL plugin injects MYSQL_URL in this format:
#   mysql://USER:PASSWORD@HOST:PORT/DATABASE
# Spring needs jdbc:mysql:// format, so we use MYSQL_PUBLIC_URL (JDBC format)
# which Railway also provides. Set DB_URL = that value in your railway variables.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool tuning for Railway's free tier (limited resources)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- Hibernate / JPA ---
# Use 'validate' in production — never 'create' or 'update' on prod!
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# --- Security ---
jwt.secret=${JWT_SECRET}
aes.secret.key=${AES_SECRET_KEY}

# --- Logging ---
# Keep logs minimal on free tier to save disk I/O
logging.level.root=WARN
logging.level.com.agriconnect=INFO
logging.level.org.hibernate=WARN
logging.level.org.springframework.security=WARN

# --- Actuator health endpoint (used by Railway healthcheck) ---
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
